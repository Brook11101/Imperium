services:
  mysql:
    image: mysql:8.4
    container_name: imperium-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: imperium
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.2
    container_name: imperium-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: imperium-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876 --enable-proxy
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
      - "10912:10912"
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m"

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: imperium-rocketmq-dashboard
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8081:8080"

  imperium-api:
    build:
      context: .
      dockerfile: backend/imperium-api/Dockerfile
    container_name: imperium-api
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-imperium}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      AGENT_CALLBACK_SECRET: ${AGENT_CALLBACK_SECRET:-dev-secret-change-in-prod}
      IMPERIUM_INTERNAL_SECRET: ${IMPERIUM_INTERNAL_SECRET:-dev-secret-change-in-prod}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  imperium-worker:
    build:
      context: .
      dockerfile: backend/imperium-worker/Dockerfile
    container_name: imperium-worker
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      rocketmq-namesrv:
        condition: service_started
      rocketmq-broker:
        condition: service_started
      imperium-api:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-imperium}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
      ROCKETMQ_NAME_SERVER: rocketmq-namesrv:9876
      IMPERIUM_BASE_URL: http://imperium-api:8080
      OPENCLAW_PATH: /usr/local/bin/openclaw
      AGENT_CALLBACK_SECRET: ${AGENT_CALLBACK_SECRET:-dev-secret-change-in-prod}
      IMPERIUM_INTERNAL_SECRET: ${IMPERIUM_INTERNAL_SECRET:-dev-secret-change-in-prod}
      OPENCLAW_STATE_DIR: /root/.openclaw
    volumes:
      - ${OPENCLAW_BIN_PATH:-/opt/homebrew/bin/openclaw}:/usr/local/bin/openclaw:ro
      - ${OPENCLAW_STATE_DIR:-${HOME}/.openclaw}:/root/.openclaw

  imperium-web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: imperium-web
    depends_on:
      imperium-api:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mysql-data:
